openapi: 3.0.3
info:
  title: Freightoscope Financial Documents API
  version: 1.0.0
  description: >
    Outbound Freightoscope financial document APIs for posting invoice,
    credit note, debit note, and bill document data to external systems.

servers:
  - url: https://fms-test-api.azurewebsites.net
    description: Test environment
  - url: https://fms-live-api.azurewebsites.net
    description: Live environment

tags:
  - name: Financial Documents
    description: Outbound financial document posting APIs

paths:
  /post/invoice/:
    post:
      tags:
        - Financial Documents
      summary: Post invoice document data
      operationId: postInvoiceDocument
      description: Sends Freightoscope invoice document data to an external system.
      security:
        - basicAuth: []
      responses:
        '200':
          description: Invoice document payload returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvoiceDocumentPayload'
        '400':
          description: Invalid payload or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /post/creditnote/:
    post:
      tags:
        - Financial Documents
      summary: Post credit note document data
      operationId: postCreditNoteDocument
      description: Sends Freightoscope credit note document data to an external system.
      security:
        - basicAuth: []
      responses:
        '200':
          description: Credit note document payload returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreditNoteDocumentPayload'
        '400':
          description: Invalid payload or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /post/debitnote/:
    post:
      tags:
        - Financial Documents
      summary: Post debit note document data
      operationId: postDebitNoteDocument
      description: Sends Freightoscope debit note document data to an external system.
      security:
        - basicAuth: []
      responses:
        '200':
          description: Debit note document payload returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebitNoteDocumentPayload'
        '400':
          description: Invalid payload or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /post/bill/:
    post:
      tags:
        - Financial Documents
      summary: Post bill document data
      operationId: postBillDocument
      description: Sends Freightoscope bill document data to an external system.
      security:
        - basicAuth: []
      responses:
        '200':
          description: Bill document payload returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BillDocumentPayload'
        '400':
          description: Invalid payload or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Use the Freightoscope-provided username and password for this integration.
  schemas:
    SuccessResponse:
      type: object
      properties:
        Message:
          type: string
          example: Document posted successfully
        Code:
          type: integer
          example: 200
    ErrorResponse:
      type: object
      properties:
        Message:
          type: string
          example: Validation failed
        Code:
          type: integer
          example: 400
