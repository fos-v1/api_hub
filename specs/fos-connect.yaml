    Tracking:
      type: object
      properties:
        SenderShipmentId:
          type: string
          example: ID-9321

        SenderJobNo:
          type: string
          example: RS-0021

        ShipmentNumber:
          type: string
          example: SHPT9321

        Event:
          type: object
          properties:
            Code:
              type: string
              example: TRS
            Description:
              type: string
              example: Tracking Request Sent

        EventDateTime:
          type: string
          description: Event timestamp in ISO format
          example: 2026-12-02T00:10:00
          format: date-time

        Status:
          type: string
          example: Planned

        Location:
          type: string
          example: BOM

        Pcs:
          type: integer
          example: 5

        Weight:
          type: number
          format: float
          example: 500

        WeightUOM:
          type: string
          example: KGS

        ContainerNumber:
          type: string
          example: BA836254

        documentList:
          type: array
          items:
            type: object
            properties:
              DocumentName:
                type: string
                example: POD
              DocumentLink:
                type: string
                format: uri
                example: https://fileserve.blob.core.windows.net/upload/fos/2339/4347-4328-9626-1664-4065-6614-4578/MAWB.pdf
    ShipmentDocument:
      type: object
      required:
        - ShipmentNo
        - DocumentName
        - DocumentLink
      properties:
        ShipmentNo:
          type: string
          example: SHPT-9321

        DocumentName:
          type: string
          example: OTHERS

        DocumentLink:
          type: string
          format: uri
          example: https://fileserve.blob.core.windows.net/upload/fos/2339/4347-4328-9626-1664-4065-6614-4578-4819-4539-4853-4436/MBL_final_RAMOE_25100005.pdf
