  /shipmenttracking:
    post:
      tags: [Shipment Tracking]
      summary: Post Tracking details of the shipment
      description: es tracking details for a shared shipment .Authentication is provided via query parameters in the request URL.
      operationId: postSharedTracking
#      parameters:
#        - in: query
#          name: UserName
##          required: true
#          schema:
##            type: string
#          description: Application user name.
#          example: example_user
##        - in: query
#          name: Password
#          required: true
#          schema:
#            type: string
#            format: password
#          description: Application password.
#          example: example_password
#        - in: query
#          name: CompanyId
#          required: true
#          schema:
#            type: integer
#          description: Numeric company identifier.
#          example: 10001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - UserName
                - Password
                - CompanyId
                - TrackingList
              properties:
                UserName:
                  type: string
                  example: Sahil_Royal_Chembur
                  description: UserName as configured in the corresponding branch in Freightoscope.
                Password:
                  type: string
                  example: "9967"
                  description: Password as configured in the corresponding branch in Freightoscope.

                CompanyId:
                  type: integer
                  example: 29780
                  description: Numeric company identifier of the corresponding branch in Freightoscope.

                TrackingList:
                  type: array
                  items:
                    type: object
                    required:
                      - SenderShipmentId
                      - ReceiverId
                    properties:

                      SenderShipmentId:
                        type: integer
                        example: 33180

                      ReceiverId:
                        type: integer
                        example: 20415

                      SenderJobNo:
                        type: string
                        example: "36"

                      EventStatus:
                        type: string
                        example: In Transit

                      EventStatusType:
                        type: string
                        example: Movement

                      EventStatusDesc:
                        type: string
                        example: Shipment departed from origin

                      Location:
                        type: string
                        example: Dubai

                      PCS:
                        type: integer
                        example: 5

                      Weight:
                        type: number
                        format: float
                        example: 125.50

                      WeightUOM:
                        type: string
                        example: KGS  

                      ContainerNo:
                        type: string
                        example: CONT1234567

                      VesselName:
                        type: string
                        example: MSC Aurora

                      VoyageNo:
                        type: string
                        example: VY789

                      VehicleCarrier:
                        type: string
                        example: Truck

                      VehicleRefNo:
                        type: string
                        example: TRK-5566

                      FlightNo:
                        type: string
                        example: EK202

                      dockets:
                        type: array
                        items:
                          type: object
                          properties:
                            upload:
                              type: object
                              properties:
                                ClientFileName:
                                  type: string
                                  example: Import_CASS_Report_Test_final.pdf  

      responses:
        '200':
          description: Tracking data fetched succsessfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Tracking Event created successfully

        '400':
          description: Shipment creation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Tracking Event creation failed
                  Code:
                    type: integer
                    example: 400
                required:
                  - Message
                  - Code
        '403':
          description: Your company does not have permission to access shared shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Your company does not have permission to access shared Tracking
                  Code:
                    type: integer
                    example: 403
                required:
                  - Message
                  - Code      
        '500':
          description: Please share Provper validation request
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Please share Proper validation request
                  Code:
                    type: integer
                    example: 500
                required:
                  - Message
                  - Code         
