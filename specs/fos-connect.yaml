  /postshipmentdocument:
    post:
      tags: [Shipment Documents]
      summary: Upload document for shipment
      description: >
        Uploads a document for a specific shipment.
        Authentication is provided via query parameters.
      operationId: uploadShipmentDocument

#      parameters:
#        - in: query
#          name: UserName
#          required: true
#          schema:
#            type: string

#        - in: query
#          name: Password
#          required: true
#          schema:
#            type: string
#            format: password

#        - in: query
#          name: CompanyId
#          required: true
#          schema:#
#            type: integer

      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - UserName
                - Password
                - CompanyId
                - ShipmentData
              properties:
                UserName:
                  type: string
                  example: example_user      
                  description: UserName as configured in the corresponding branch in Freightoscope.
                Password:
                  type: string  
                  example: example_password
                  description: Password as configured in the corresponding branch in Freightoscope.
                CompanyId:
                  type: integer
                  example: 10001     
                  description: Numeric company identifier of the corresponding branch in Freightoscope.
                DocumentList:
                      type: array
                      items:
                        type: object
                        required:
                          - ShipmentId
                          - DocumentName
                        properties:

                          ShipmentId:
                            type: integer
                            example: 33180
                            description: Numeric identifier of the shipment for which the document is being uploaded. This ID should correspond to the shipment shared with the company from the sender branch.

                        #  DocumentMasterId:
                        #    type: integer
                        #    nullable: true
                        #    example: 2002

                        #  ReportLink:
                        #    type: string
                        #    nullable: true
                        #    description: File path or external report link
                        #    example: Import_CASS_Report_Test_final.pdf

                          DocumentName:
                            type: string
                            description: Name of the uploaded document
                            example: Import_CASS_Report_Test_final.pdf

                    

      responses:
        '200':
          description: Document uploaded successfully
          
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Document uploaded successfully
                  Code:
                    type: integer
                    example: 200
