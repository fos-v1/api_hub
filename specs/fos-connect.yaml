  /getshipmentdocument:
    get:
      tags: [Shipment Documents]
      summary: Get documents for shipment
      description: >
        Fetches all documents linked to a specific shipment.
      operationId: getShipmentDocuments

      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
            example: example_user
            description: UserName as configured in the corresponding branch in Freightoscope.

        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
            example: example_password
          description: Password as configured in the corresponding branch in Freightoscope.

        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
            example: 10001
          description: Numeric company identifier of the corresponding branch in Freightoscope.

        - in: query
          name: SenderJobNo
          required: true
          schema:
            type: string
            example: SHPT-9321
            description: Job Number of Shipment Shared by the Sender


      responses:
        '200':
          description: Documents fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShipmentDocument'
        '403':
          description: Your company does not have permission to access shared shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Your company does not have permission to access shared Shipment Documents
                  Code:
                    type: integer
                    example: 403
                required:
                  - Message
                  - Code      
        '500':
          description: Please share Provper validation request
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Please share Proper validation request
                  Code:
                    type: integer
                    example: 500
                required:
                  - Message
                  - Code                  
              example:
                Message: Please share Proper validation request
                Code: 500

