openapi: 3.0.3
info:
  title: FOS Connect APIs
  version: 1.0.0
  description: Freightoscope FOS Connect endpoints for partner discovery, shipment sharing, tracking, and documents. 

servers:
  - url: https://fms-test-api.azurewebsites.net
    description: Test Freightoscope environment

tags:
  - name: Overseas Partner Id's
    description: API to fetch overseas partner id's for a company 
  - name: Shipment Sharing
    description: Shipment creation and retrieval endpoints
  - name: Shipment Tracking
    description: Tracking data for shared shipments
  - name: Shipment Documents
    description: Document uploads and downloads    

paths:
  /getoverseaspartnerlist:
    get:
      tags: [Overseas Partner Id's]
      summary: Get overseas partner id's for a company
      description: >
        Fetches overseas partner id's linked to the company.
        Authentication is provided via query parameters in the request URL.
      operationId: getOverseasPartnerIds
      parameters:
        - in: query
          name: UserName
          required: true
          schema:
            type: string
          description: UserName as configured in the corresponding branch in Freightoscope.
          example: example_user
        - in: query
          name: Password
          required: true
          schema:
            type: string
            format: password
          description: Password as configured in the corresponding branch in Freightoscope.
          example: example_password
        - in: query
          name: CompanyId
          required: true
          schema:
            type: integer
          description: Numeric company identifier of the corresponding branch in Freightoscope.
          example: 10001
      responses:
        '200':
          description: Overseas partner id's fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OverseasPartnerIdsResponse'
        '403':
          description: Your company does not have permission to access shared shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Your company does not have permission to access shared shipments
                  Code:
                    type: integer
                    example: 403
                required:
                  - Message
                  - Code      
        '500':
          description: Please share Provper validation request
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Please share Provper validation request
                  Code:
                    type: integer
                    example: 500
                required:
                  - Message
                  - Code            

  /post/shipment/air:
    post:
      tags: [Shipment Sharing]
      summary: Create a new air shipment
      description: >
        Creates an air shipment in Freightoscope.
        Authentication is provided via query parameters in the request URL.
      operationId: createShipment
#      parameters:
#        - in: query
#          name: UserName
#          required: true
#          schema:
#            type: string
#          description: Application user name.
#          example: example_user
#        - in: query
#          name: Password
#          required: true
#          schema:
#            type: string
#            format: password
#          description: Application password.
#          example: example_password
#        - in: query
#          name: CompanyId
#          required: true
#          schema:
#            type: integer
#          description: Numeric company identifier.
#          example: 10001
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - UserName
                - Password
                - CompanyId
                - ShipmentData
              properties:
                UserName:
                  type: string
                  example: example_user     
                  description: UserName as configured in the corresponding branch in Freightoscope. 
                Password:
                  type: string  
                  example: example_password
                  description: Password as configured in the corresponding branch in Freightoscope.
                CompanyId:
                  type: integer
                  example: 10001     
                  description: Numeric company identifier of the corresponding branch in Freightoscope.
                ShipmentData:
                  $ref: '#/components/schemas/Air Shipment'    
            
      responses:
        '200':
          description: Shipment created Successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Shipment created Successfully
                  Code:
                    type: integer
                    example: 200
                required:
                  - Message
                  - Code
        '400':
          description: Shipment creation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Shipment creation failed
                  Code:
                    type: integer
                    example: 400
                required:
                  - Message
                  - Code
        '403':
          description: Your company does not have permission to access shared shipments
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Your company does not have permission to access shared shipments
                  Code:
                    type: integer
                    example: 403
                required:
                  - Message
                  - Code      
        '500':
          description: Please share Provper validation request
          content:
            application/json:
              schema:
                type: object
                properties:
                  Message:
                    type: string
                    example: Please share Provper validation request
                  Code:
                    type: integer
                    example: 500
                required:
                  - Message
                  - Code   # Required fields for error response

