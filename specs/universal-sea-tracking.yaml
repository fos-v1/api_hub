openapi: 3.0.3
info:
  title: Universal Sea Tracking
  version: 1.0.0
  description: Freightoscope Universal Sea Tracking batch list APIs based on the Universal Container
    Tracking (UCT) customer guide, including login, carrier lookup, and batch list
    POST, GET, and DELETE operations.
servers:
- url: https://fms-live-api.azurewebsites.net/
  description: Freightoscope production environment
- url: https://fms-test-api.azurewebsites.net/
  description: Freightoscope TEST environment
tags:
- name: Authentication
  description: Login endpoint used before calling tracking APIs
- name: Universal Sea Tracking
  description: Sea freight container tracking APIs from the UCT guide
paths:
  /api/v1/Login:
    post:
      tags:
      - Authentication
      summary: Login and start a Freightoscope session
      operationId: loginUniversalTracking
      description: 'Authenticates with Freightoscope and starts a session. Use the returned
        `authToken` value from the login response as the token for all other
        Universal Sea Tracking API calls.

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              Username: user@company.com
              Password: secret
      responses:
        '200':
          description: Login succeeded
          headers:
            Set-Cookie:
              description: 'Session cookie containing `authToken`; send the latest
                cookie value back on the next request.

                '
              schema:
                type: string
                example: authToken=abcdef123456; path=/api; HttpOnly
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginApiResponse'
              example:
                headers:
                  Cache-Control: no-cache
                  Content-Encoding: gzip
                  Content-Length: 806
                  Content-Type: application/json; charset=utf-8
                  Date: Tue, 16 Dec 2014 07:00:05 GMT
                  Expires: '-1'
                  Pragma: no-cache
                  Set-Cookie:
                    authToken: C9F3440891B1456002C223785F2C43581A00369CE7B6021E3B00FA21618FEBC51F04831AD0717A4FF7EF29A0882A38B9940E9E238CFE965ABA1C581399CCA2A804D663A521023F7953D40CC19EF6C7CED0086B6F5F8D3C7A4352111247988B4D6789876D34A526823AF18E8DC4EE44BD
                    expires: Tue, 23-Dec-2014 07:00:05 GMT
                    path: /api
                    HttpOnly: true
                  Vary: Accept-Encoding
                body:
                  LastLogin: '2014-12-16T10:58:52.293529Z'
                  UserDetails:
                    ContactID: 674
                    AgentID: 109364
                    FirstName: UAT
                    LastName: APIUser
                    Email: UAT.apiuser@company.com
                    JobTitle: Software Application
                    ContactNumber: '+91889999999'
                    IsActivated: true
                    OperatedBy: null
                    Permissions:
                      - airtrackingapi
        '400':
          description: Invalid login payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Invalid login payload
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Invalid login credentials
  /api/v1/uctapi/carriers:
    get:
      tags:
      - Universal Sea Tracking
      summary: Get supported UCT carriers
      operationId: listUniversalSeaTrackingCarriers
      description: 'Returns the latest valid carrier operator values for Universal
        Sea Tracking.

        '
      security:
      - tokenAuth: []
      responses:
        '200':
          description: Carrier operator values returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarrierListResponse'
              example:
              - HAMBURGSUD
              - MSC
              - MAERSK
        '401':
          description: Invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Invalid authentication token
  /api/v1/uctapi/batchlist/agents/{AgentId}:
    post:
      tags:
      - Universal Sea Tracking
      summary: Create or update UCT batch list queries
      operationId: createUniversalSeaTrackingBatchList
      description: 'Adds one or more sea tracking queries for the agent. Each POST
        is additive and does not replace the previous list. `UpdateUntil` must be
        no earlier than creation time and no later than 45 days after creation.

        '
      security:
      - tokenAuth: []
      parameters:
      - $ref: '#/components/parameters/AgentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UctBatchPostRequest'
      responses:
        '200':
          description: Summary of created, modified, and failed queries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchPostResponse'
              example:
                summary:
                  created: 2
                  modified: 2
                  failed: 1
                failed:
                - Query:
                    SearchClass: Sea
                    Carrier: HAMBURGSUD
                    SearchKey: c_id
                    SearchValue: CRLU1837190
                    UpdateUntil: '2018-06-30T01:00:00.000Z'
                  errors:
                  - property: instance.Query.SearchValue
                    message: SearchValue is expected to conform to ISO 6346 when SearchKey
                      is c_id.
        '400':
          description: Validation failed for one or more queries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Validation failed for one or more queries
        '401':
          description: Invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Invalid authentication token
    get:
      tags:
      - Universal Sea Tracking
      summary: Get UCT tracking updates
      operationId: getUniversalSeaTrackingBatchList
      description: 'Returns sea tracking updates after the provided timestamp. Freightoscope
        recommends polling this endpoint about every 2 hours. If `since` is omitted,
        Freightoscope defaults it to roughly the previous 24 hours. To fetch queries that have
        no tracking updates, call the same endpoint with `nodata=true`.

        '
      security:
      - tokenAuth: []
      parameters:
      - $ref: '#/components/parameters/AgentId'
      - $ref: '#/components/parameters/Since'
      - $ref: '#/components/parameters/NoData'
      responses:
        '200':
          description: Tracking results returned successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UctBatchGetResponse'
        '401':
          description: Invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Invalid authentication token
  /api/v1/uctapi/batchlist/agents/{AgentId}/{OperatorValue}/{SearchKey}/{SearchValue}:
    delete:
      tags:
      - Universal Sea Tracking
      summary: Delete a UCT batch list query
      operationId: deleteUniversalSeaTrackingBatchListQuery
      description: 'Deletes the sea tracking query matching the agent id, carrier
        operator value, search key, and search value.

        '
      security:
      - tokenAuth: []
      parameters:
      - $ref: '#/components/parameters/AgentId'
      - name: OperatorValue
        in: path
        required: true
        description: Carrier operator value from the UCT carrier list.
        schema:
          type: string
          example: HAMBURGSUD
      - name: SearchKey
        in: path
        required: true
        description: Query key to delete.
        schema:
          type: string
          enum:
          - c_id
          - b_id
          - m_bl
          example: c_id
      - name: SearchValue
        in: path
        required: true
        description: Container number, booking id, or MBL/BL number.
        schema:
          type: string
          example: CRLU1837190
      responses:
        '204':
          description: Query deleted successfully
        '401':
          description: Invalid authentication token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Invalid authentication token
        '404':
          description: Matching query not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessageResponse'
              example:
                error: Matching query not found
components:
  securitySchemes:
    tokenAuth:
      type: apiKey
      in: header
      name: Token
      description: 'Token authentication for all Universal Sea Tracking endpoints
        except `POST /api/v1/Login`. Pass the `authToken` value returned in the
        login response as the `Token` header.

        '
  parameters:
    AgentId:
      name: AgentId
      in: path
      required: true
      description: Freightoscope agent identifier.
      schema:
        type: integer
        example: 109364
    Since:
      name: since
      in: query
      required: false
      description: 'RFC3339 / ISO 8601 timestamp representing the last successful
        GET call.

        '
      schema:
        type: string
        format: date-time
        example: '2017-05-17T12:59:00Z'
    NoData:
      name: nodata
      in: query
      required: false
      description: 'When `true`, returns search entries for the agent whose tracking
        results are not available.

        '
      schema:
        type: boolean
        example: true
  schemas:
    LoginRequest:
      type: object
      required:
      - Username
      - Password
      properties:
        Username:
          type: string
          example: user@company.com
        Password:
          type: string
          format: password
          example: secret
    LoginApiResponse:
      type: object
      properties:
        headers:
          $ref: '#/components/schemas/LoginResponseHeaders'
        body:
          $ref: '#/components/schemas/LoginResponse'
    LoginResponseHeaders:
      type: object
      properties:
        Cache-Control:
          type: string
          example: no-cache
        Content-Encoding:
          type: string
          example: gzip
        Content-Length:
          type: integer
          example: 806
        Content-Type:
          type: string
          example: application/json; charset=utf-8
        Date:
          type: string
          example: Tue, 16 Dec 2014 07:00:05 GMT
        Expires:
          type: string
          example: '-1'
        Pragma:
          type: string
          example: no-cache
        Set-Cookie:
          $ref: '#/components/schemas/AuthTokenCookie'
        Vary:
          type: string
          example: Accept-Encoding
    AuthTokenCookie:
      type: object
      properties:
        authToken:
          type: string
        expires:
          type: string
          example: Tue, 23-Dec-2014 07:00:05 GMT
        path:
          type: string
          example: /api
        HttpOnly:
          type: boolean
          example: true
    LoginResponse:
      type: object
      properties:
        LastLogin:
          type: string
          format: date-time
          example: '2014-12-16T10:58:52.293529Z'
        UserDetails:
          $ref: '#/components/schemas/UserDetails'
    UserDetails:
      type: object
      properties:
        ContactID:
          type: integer
          example: 674
        AgentID:
          type: integer
          example: 109364
        FirstName:
          type: string
          example: UAT
        LastName:
          type: string
          example: APIUser
        Email:
          type: string
          format: email
          example: uat.apiuser@company.com
        JobTitle:
          type: string
          example: Software Application
        ContactNumber:
          type: string
          example: '+91889999999'
        IsActivated:
          type: boolean
        OperatedBy:
          type: string
          nullable: true
        Permissions:
          type: array
          items:
            type: string
    CarrierListResponse:
      type: array
      items:
        type: string
    ErrorMessageResponse:
      type: object
      properties:
        error:
          type: string
          example: Invalid authentication token
    SimpleError:
      type: object
      properties:
        error:
          type: string
          example: No Events Returned
    BatchPostResponse:
      type: object
      properties:
        summary:
          $ref: '#/components/schemas/BatchPostSummary'
        failed:
          type: array
          items:
            $ref: '#/components/schemas/FailedBatchItem'
    BatchPostSummary:
      type: object
      properties:
        created:
          type: integer
          example: 2
        modified:
          type: integer
          example: 0
        failed:
          type: integer
          example: 0
    FailedBatchItem:
      type: object
      properties:
        Query:
          type: object
          additionalProperties: true
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
    ValidationError:
      type: object
      properties:
        property:
          type: string
        message:
          type: string
        schema:
          type: object
          additionalProperties: true
        instance:
          type: object
          nullable: true
          additionalProperties: true
        stack:
          type: string
    UctBatchPostRequest:
      type: object
      required:
      - Queries
      properties:
        Queries:
          type: array
          items:
            $ref: '#/components/schemas/UctBatchQueryEnvelope'
      example:
        Queries:
        - Query:
            SearchClass: Sea
            Carrier: HAMBURGSUD
            SearchKey: c_id
            SearchValue: CRLU1837190
            UpdateUntil: '2018-06-30T01:00:00.000Z'
        - Query:
            SearchClass: Sea
            Carrier: MSC
            SearchKey: m_bl
            SearchValue: 98796E488GX
            UpdateUntil: '2018-08-31T01:00:00.000Z'
    UctBatchQueryEnvelope:
      type: object
      required:
      - Query
      properties:
        Query:
          $ref: '#/components/schemas/UctBatchQuery'
    UctBatchQuery:
      type: object
      required:
      - Carrier
      - SearchKey
      - SearchValue
      - UpdateUntil
      properties:
        Carrier:
          type: string
          description: Carrier operator value from `GET /api/v1/uctapi/carriers`.
        CreatedDate:
          type: string
          format: date-time
          nullable: true
        SearchClass:
          type: string
          enum:
          - Sea
          default: Sea
        SearchKey:
          type: string
          enum:
          - c_id
          - b_id
          - m_bl
        SearchValue:
          type: string
          description: 'Container number, booking id, or MBL/BL number. When `SearchKey`
            is `c_id`, the value must conform to ISO 6346.

            '
        UpdateUntil:
          type: string
          format: date-time
          description: Maximum 45 days from creation.
        Reference:
          type: string
          nullable: true
        WebhookURL:
          type: string
          nullable: true
    UctBatchGetResponse:
      type: object
      properties:
        Queries:
          type: array
          items:
            $ref: '#/components/schemas/UctTrackingRecord'
      example:
        Queries:
        - Query:
            Carrier: MOL
            SearchKey: c_id
            SearchValue: TCLU7184865
            meta:
              agentid: '103243'
              listName: ''
              queryID: operator=MOL&type=c_id&no=TCLU7184865
              lastModified: null
              CreatedDate: '2018-07-04T09:47:32Z'
              lastCheck: null
            UpdateUntil: '2018-08-23T03:00:00Z'
            SearchClass: Sea
            Reference: Optional User Supplied Reference
            WebhookURL: null
          Results:
            LastChanged: '2018-07-04T09:49:32.32Z'
            Status: Fetched
            Data:
              meta: null
              errors: []
              Containers: []
              BookingNumber: null
              BLNumber: null
    TrackingQueryMeta:
      type: object
      additionalProperties: true
      properties:
        agentid:
          type: string
        listName:
          type: string
        queryID:
          type: string
        lastModified:
          nullable: true
        CreatedDate:
          type: string
          format: date-time
          nullable: true
        lastCheck:
          type: string
          format: date-time
          nullable: true
    UctTrackingRecord:
      type: object
      properties:
        Query:
          $ref: '#/components/schemas/UctTrackedQuery'
        Results:
          $ref: '#/components/schemas/UctTrackingResults'
    UctTrackedQuery:
      type: object
      properties:
        Carrier:
          type: string
        SearchKey:
          type: string
          enum:
          - c_id
          - b_id
          - m_bl
        SearchValue:
          type: string
        meta:
          $ref: '#/components/schemas/TrackingQueryMeta'
        UpdateUntil:
          type: string
          format: date-time
        SearchClass:
          type: string
          enum:
          - Sea
        Reference:
          type: string
          nullable: true
        WebhookURL:
          type: string
          nullable: true
    TrackingResultsBase:
      type: object
      properties:
        LastChanged:
          type: string
          format: date-time
        Status:
          type: string
          description: Usually `Fetched`, `Pending`, or `Error`.
    UctTrackingResults:
      allOf:
      - $ref: '#/components/schemas/TrackingResultsBase'
      - type: object
        properties:
          Data:
            $ref: '#/components/schemas/UctTrackingData'
    UctTrackingData:
      type: object
      properties:
        meta:
          type: object
          nullable: true
          additionalProperties: true
        errors:
          type: array
          items:
            $ref: '#/components/schemas/SimpleError'
        Containers:
          type: array
          items:
            $ref: '#/components/schemas/UctContainer'
        BookingNumber:
          type: string
          nullable: true
        BLNumber:
          type: string
          nullable: true
    UctContainer:
      type: object
      properties:
        Events:
          type: array
          items:
            $ref: '#/components/schemas/UctEvent'
        ContainerNumber:
          type: string
          nullable: true
        ContainerType:
          $ref: '#/components/schemas/CodeName'
        ETA:
          type: string
          nullable: true
        ETD:
          type: string
          nullable: true
        ATA:
          type: string
          nullable: true
        ATD:
          type: string
          nullable: true
    UctEvent:
      type: object
      properties:
        Activity:
          type: object
          properties:
            Code:
              type: string
              nullable: true
            Name:
              type: string
        State:
          type: string
          nullable: true
          description: Usually `Planned` or `Completed`.
        Location:
          $ref: '#/components/schemas/CodeName'
        DateTime:
          type: string
          nullable: true
          description: Local date and time for the event.
        Transport:
          type: object
          properties:
            Capacity:
              type: string
              nullable: true
            IMONumber:
              type: string
              nullable: true
            Liner:
              type: string
              nullable: true
            Vessel:
              type: string
              nullable: true
            Voyage:
              type: string
              nullable: true
        Locations:
          $ref: '#/components/schemas/UctLocations'
    UctLocations:
      type: object
      properties:
        PlaceOfReceipt:
          $ref: '#/components/schemas/UctLocationWithEtd'
        PortOfLoading:
          $ref: '#/components/schemas/UctLocationWithEtd'
        PortOfFinalDischarge:
          $ref: '#/components/schemas/UctLocationWithEta'
        PlaceOfDelivery:
          $ref: '#/components/schemas/UctLocationWithEta'
    UctLocationWithEtd:
      type: object
      properties:
        ETD:
          type: string
          nullable: true
        Code:
          type: string
          nullable: true
        Name:
          type: string
          nullable: true
    UctLocationWithEta:
      type: object
      properties:
        ETA:
          type: string
          nullable: true
        Code:
          type: string
          nullable: true
        Name:
          type: string
          nullable: true
    CodeName:
      type: object
      properties:
        Code:
          type: string
          nullable: true
        Name:
          type: string
          nullable: true
